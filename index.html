<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>PUT Smart Dashboard</title>

<style>
body {
    background:#0f172a;
    color:white;
    font-family:Arial;
}

.container {
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.box {
    background:#1e293b;
    padding:20px;
    border-radius:12px;
}

input {
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:6px;
    border:none;
}

button {
    width:100%;
    padding:12px;
    background:#22c55e;
    border:none;
    color:white;
    font-weight:bold;
    cursor:pointer;
    border-radius:6px;
}

h1 {
    margin-bottom:10px;
}
</style>

</head>

<body>

<div class="container">

<h1>📊 PUT Smart Dashboard</h1>

<button onclick="aggiornaDati()">🔄 Refresh</button>

<div class="grid">

<div class="box">
<h2>📊 Dati</h2>
<input id="symbol" value="SPY">
<input id="prezzo" placeholder="Prezzo">
<input value="410">
<input value="30">
<input id="vix" placeholder="Volatilità (VIX)">
<input id="rsi" placeholder="RSI">
<input id="trend" placeholder="Trend">
</div>

<div class="box" id="sicurezza">
<h2>🛡 Sicurezza</h2>
</div>

<div class="box" id="analisi">
<h2>📈 Analisi</h2>
</div>

<div class="box" id="segnale">
<h2>🤖 Segnale</h2>
</div>

<div class="box" id="put">
<h2>🏆 Migliori PUT</h2>
</div>

</div>
</div>

<script>
async function aggiornaDati() {
    try {
        // 📊 SP500 (SPY)
        const res = await fetch("https://corsproxy.io/?https://query1.finance.yahoo.com/v7/finance/quote?symbols=SPY");
        const data = await res.json();

        const prezzo = data.quoteResponse.result[0].regularMarketPrice;
        document.getElementById("prezzo").value = prezzo.toFixed(2);

        // 📉 VIX (volatilità)
        const vixRes = await fetch("https://corsproxy.io/?https://query1.finance.yahoo.com/v7/finance/quote?symbols=%5EVIX");
        const vixData = await vixRes.json();

        const vix = vixData.quoteResponse.result[0].regularMarketPrice;
        document.getElementById("vix").value = vix.toFixed(2);

        // 📊 RSI simulato (temporaneo)
        const rsi = Math.floor(Math.random() * 30) + 40;
        document.getElementById("rsi").value = rsi;

        // 📈 Trend
        let trend = "";
        if (rsi > 60) trend = "📈 Forte rialzo";
        else if (rsi > 50) trend = "📈 Rialzista";
        else if (rsi > 40) trend = "➡️ Laterale";
        else trend = "📉 Ribassista";

        document.getElementById("trend").value = trend;

        // 🛡 Sicurezza
        let sicurezza = "";
        if (vix < 15) sicurezza = "🔥 MOLTO SICURO";
        else if (vix < 20) sicurezza = "✅ SICURO";
        else if (vix < 25) sicurezza = "⚠️ ATTENZIONE";
        else sicurezza = "❌ RISCHIOSO";

        document.getElementById("sicurezza").innerHTML =
            "<h2>🛡 Sicurezza</h2><p>"+sicurezza+"</p>";

        // 📈 Analisi
        document.getElementById("analisi").innerHTML =
            "<h2>📈 Analisi</h2><p>Prezzo: "+prezzo+
            "<br>VIX: "+vix+
            "<br>RSI: "+rsi+"</p>";

        // 🤖 Segnale
        let segnale = "";
        if (trend.includes("rialzo") && vix < 20) {
            segnale = "💰 VENDI PUT (condizioni buone)";
        } else {
            segnale = "⛔ ASPETTA";
        }

        document.getElementById("segnale").innerHTML =
            "<h2>🤖 Segnale</h2><p>"+segnale+"</p>";

        // 🏆 Strike consigliato
        let strike = prezzo * 0.95;

        document.getElementById("put").innerHTML =
            "<h2>🏆 Migliori PUT</h2>" +
            "<p>Strike consigliato: <b>"+strike.toFixed(2)+"</b><br>" +
            "Distanza: 5%<br>" +
            "Strategia: Cash Secured PUT</p>";

    } catch (error) {
        alert("Errore dati (proxy momentaneamente non disponibile)");
        console.log(error);
    }
}

// auto refresh ogni 30 sec
setInterval(aggiornaDati, 30000);

// primo caricamento
aggiornaDati();
</script>

</body>
</html>
